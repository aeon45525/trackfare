<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ffb783",
              "on-primary-fixed-variant": "#0040a1",
              "surface-container": "#edeeef",
              "on-tertiary-container": "#ffd0b0",
              "on-secondary": "#ffffff",
              "on-surface": "#191c1d",
              "outline-variant": "#c3c6d6",
              "tertiary-fixed": "#ffdcc5",
              "surface-tint": "#0056d2",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "tertiary-container": "#944b00",
              "on-error": "#ffffff",
              "on-primary-fixed": "#001847",
              "on-surface-variant": "#424654",
              "secondary-fixed-dim": "#afcae2",
              "secondary": "#486176",
              "tertiary": "#713700",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "on-secondary-container": "#4e677c",
              "on-error-container": "#93000a",
              "secondary-container": "#cbe6ff",
              "surface-container-high": "#e7e8e9",
              "outline": "#737785",
              "inverse-surface": "#2e3132",
              "on-background": "#191c1d",
              "background": "#f8f9fa",
              "inverse-primary": "#b2c5ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#cbe6ff",
              "error": "#ba1a1a",
              "surface-container-low": "#f3f4f5",
              "primary-fixed": "#dae2ff",
              "primary": "#0040a1",
              "inverse-on-surface": "#f0f1f2",
              "on-secondary-fixed-variant": "#30495d",
              "on-tertiary-fixed-variant": "#713700",
              "primary-container": "#0056d2",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#301400",
              "on-primary-container": "#ccd8ff",
              "on-secondary-fixed": "#001e30",
              "surface-variant": "#e1e3e4",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#b2c5ff",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .signature-gradient {
        background: linear-gradient(135deg, #0040a1 0%, #0056d2 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-4 h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 shadow-sm dark:shadow-none">
<div class="flex items-center">
<button class="active:scale-95 transition-transform hover:opacity-80 transition-opacity text-[#0040a1] dark:text-blue-400">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#0040a1] dark:text-blue-400">Profile</h1>
<div class="flex items-center">
<button class="active:scale-95 transition-transform hover:opacity-80 transition-opacity text-[#0040a1] dark:text-blue-400">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-20 px-4 space-y-6">
<!-- Profile Header Section -->
<section class="flex flex-col items-center space-y-4">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm">
<img class="w-full h-full object-cover" data-alt="Professional portrait of a male passenger" src="https://lh3.googleusercontent.com/aida/ADBb0ujtfs3LtLrKxV7Upnl5nwNwsu3icOaXIgHBavoNRtHg4-kCm6TB8P3eu-DZnC09Z-EATLRyqa8j0X5H31anw26ZXJV8oaJfjSf1Hl4oOxFlIGxoxAYq-u_83r8HYfaLOu2MwGzCPHUU0ySsYFjjO6Kc8tNvgTeGF-Ln-2i_HfB4U6IXh_oQdxfkQBq7DqckWq3WcZEDGwqWtwe1C4czuxQERpbRv_uppmgo5F4xIkhnas_tb8IziK7enS-OHxUfdnSfq-Lu0YDPGLA"/>
</div>
<div class="absolute bottom-1 right-1 bg-primary p-2 rounded-full text-on-primary shadow-lg border-2 border-surface-container-lowest active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</div>
</div>
<div class="text-center space-y-1">
<h2 class="text-2xl font-headline font-extrabold tracking-tight text-on-surface">John Doe</h2>
</div>
</section>
<!-- Wallet Bento Card -->
<section class="bg-surface-container-lowest p-6 rounded-xl shadow-sm border border-outline-variant/10">
<div class="flex justify-between items-start mb-6">
<div class="space-y-1">
<p class="text-xs font-bold text-on-surface-variant tracking-widest uppercase">Available Balance</p>
<div class="flex items-baseline space-x-1">
<span class="text-3xl font-headline font-extrabold text-primary">₱1,240.50</span>
</div>
</div>
<div class="bg-secondary-container p-3 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
</div>
<!-- Top Up Button -->
<button class="w-full h-12 signature-gradient text-on-primary rounded-xl flex items-center justify-center space-x-3 active:scale-[0.98] transition-all shadow-md">
<span class="material-symbols-outlined text-xl" data-icon="add_circle">add_circle</span>
<span class="font-semibold text-sm">Wallet Top-up</span>
</button>
</section>
<!-- Settings List (Implicit but necessary for Profile UI) -->
<section class="bg-surface-container-low rounded-xl overflow-hidden">
<div class="p-2 space-y-1">
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg hover:bg-surface-container hover:opacity-90 transition-all">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-primary" data-icon="history">history</span>
<span class="font-medium text-sm">Travel History</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg hover:bg-surface-container hover:opacity-90 transition-all">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-primary" data-icon="settings">settings</span>
<span class="font-medium text-sm">Account Settings</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg hover:bg-surface-container hover:opacity-90 transition-all">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-primary" data-icon="help_center">help_center</span>
<span class="font-medium text-sm">Support &amp; FAQ</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Logout Action -->
<section class="pb-12">
<button class="w-full flex items-center justify-center space-x-2 p-4 text-error font-semibold hover:bg-error-container/20 rounded-xl transition-colors border border-error/20">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span>Logout</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-safe h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-t-3xl z-50 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-[#0056d2] dark:hover:text-blue-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-[#0056d2] dark:hover:text-blue-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="directions_bus">directions_bus</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-wider">Routes</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-[#0056d2] dark:hover:text-blue-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-wider">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-[#0056d2] dark:hover:text-blue-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-wider">History</span>
</a>
<a class="flex flex-col items-center justify-center text-[#0040a1] dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 rounded-2xl py-2 px-4 hover:text-[#0056d2] dark:hover:text-blue-300 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-wider">Profile</span>
</a>
</nav>
</body></html>
