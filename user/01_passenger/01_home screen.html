<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ffb783",
              "on-primary-fixed-variant": "#0040a1",
              "surface-container": "#edeeef",
              "on-tertiary-container": "#ffd0b0",
              "on-secondary": "#ffffff",
              "on-surface": "#191c1d",
              "outline-variant": "#c3c6d6",
              "tertiary-fixed": "#ffdcc5",
              "surface-tint": "#0056d2",
              surface: "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "tertiary-container": "#944b00",
              "on-error": "#ffffff",
              "on-primary-fixed": "#001847",
              "on-surface-variant": "#424654",
              "secondary-fixed-dim": "#afcae2",
              secondary: "#486176",
              tertiary: "#713700",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "on-secondary-container": "#4e677c",
              "on-error-container": "#93000a",
              "secondary-container": "#cbe6ff",
              "surface-container-high": "#e7e8e9",
              outline: "#737785",
              "inverse-surface": "#2e3132",
              "on-background": "#191c1d",
              background: "#f8f9fa",
              "inverse-primary": "#b2c5ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#cbe6ff",
              error: "#ba1a1a",
              "surface-container-low": "#f3f4f5",
              "primary-fixed": "#dae2ff",
              primary: "#0056d2",
              "inverse-on-surface": "#f0f1f2",
              "on-secondary-fixed-variant": "#30495d",
              "on-tertiary-fixed-variant": "#713700",
              "primary-container": "#0056d2",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#301400",
              "on-primary-container": "#ccd8ff",
              "on-secondary-fixed": "#001e30",
              "surface-variant": "#e1e3e4",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#b2c5ff",
              "on-primary": "#ffffff",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "1rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-blur {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-surface font-body text-on-surface">
    <header
      class="fixed top-0 left-0 w-full flex justify-between items-center px-4 h-16 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm z-50"
    >
      <div class="flex items-center gap-3">
        <span
          class="material-symbols-outlined text-on-surface-variant transition-transform active:scale-95"
          data-icon="menu"
          >menu</span
        >
        <h1
          class="font-headline font-extrabold text-xl tracking-tighter text-primary"
        >
          TrackFare
        </h1>
      </div>
      <div class="flex items-center">
        <span
          class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95"
          data-icon="notifications"
          >notifications</span
        >
      </div>
    </header>
    <main class="pt-16 pb-24 min-h-screen">
      <!-- Search Area -->
      <div class="px-4 py-4">
        <div class="relative w-full">
          <div
            class="absolute inset-y-0 left-4 flex items-center pointer-events-none"
          >
            <span
              class="material-symbols-outlined text-outline"
              data-icon="search"
              >search</span
            >
          </div>
          <input
            class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest rounded-lg border border-outline-variant shadow-sm focus:ring-2 focus:ring-primary/20 font-body text-on-surface placeholder:text-outline"
            placeholder="Where are you going?"
            type="text"
          />
        </div>
      </div>
      <!-- Interactive Map Section -->
      <section class="relative w-full px-4 h-[60vh]">
        <div
          class="w-full h-full rounded-2xl overflow-hidden shadow-sm relative"
        >
          <div id="map" class="w-full h-full"></div>
          <!-- Floating Controls -->
          <div class="absolute top-4 right-4 flex flex-col gap-2">
            <button
              class="w-10 h-10 bg-surface-container-lowest rounded-lg shadow-md flex items-center justify-center text-on-surface active:bg-surface-container"
            >
              <span class="material-symbols-outlined" data-icon="my_location"
                >my_location</span
              >
            </button>
            <button
              class="w-10 h-10 bg-surface-container-lowest rounded-lg shadow-md flex items-center justify-center text-on-surface active:bg-surface-container"
            >
              <span class="material-symbols-outlined" data-icon="layers"
                >layers</span
              >
            </button>
          </div>
        </div>
      </section>
      <!-- Bus Information Card -->
      <section class="px-4 mt-4">
        <div
          class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant"
        >
          <div class="flex justify-between items-start mb-4">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 bg-primary-fixed rounded-xl flex items-center justify-center"
              >
                <span
                  class="material-symbols-outlined text-primary text-2xl"
                  data-icon="directions_bus"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >directions_bus</span
                >
              </div>
              <div>
                <h3 class="font-headline font-bold text-xl text-on-surface">
                  Victory Liner
                </h3>
                <p class="text-on-surface-variant text-sm font-medium">
                  Santa Maria → Monumento
                </p>
              </div>
            </div>
            <div class="text-right">
              <span
                class="block font-headline font-extrabold text-2xl text-primary"
                >₱85.00</span
              >
            </div>
          </div>
          <div
            class="mb-6 p-4 bg-surface-container-low rounded-xl border border-outline-variant/30"
          >
            <div class="flex items-start gap-3">
              <span
                class="material-symbols-outlined text-primary mt-0.5"
                data-icon="info"
                style="font-size: 18px"
                >info</span
              >
              <div>
                <p class="text-sm font-semibold text-on-surface">
                  Next Stop: Bocaue Exit
                </p>
                <p class="text-sm text-on-surface-variant">
                  Estimated Arrival:
                  <span class="text-primary font-bold">12 mins</span>
                </p>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <!-- Primary Button: Track -->
            <button
              class="flex items-center justify-center gap-2 h-12 rounded-lg bg-primary text-white font-bold text-sm transition-all active:scale-95 shadow-md"
            >
              <span
                class="material-symbols-outlined text-lg"
                data-icon="near_me"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >near_me</span
              >
              Track
            </button>
            <!-- Neutral Button: Scan -->
            <button
              class="flex items-center justify-center gap-2 h-12 rounded-lg bg-surface-container-high text-on-surface-variant font-bold text-sm transition-all active:scale-95 border border-outline-variant"
            >
              <span
                class="material-symbols-outlined text-lg"
                data-icon="qr_code_scanner"
                >qr_code_scanner</span
              >
              Scan
            </button>
            <!-- Neutral Button: Routes -->
            <button
              class="flex items-center justify-center gap-2 h-12 rounded-lg bg-surface-container-high text-on-surface-variant font-bold text-sm transition-all active:scale-95 border border-outline-variant"
            >
              <span class="material-symbols-outlined text-lg" data-icon="route"
                >route</span
              >
              Routes
            </button>
          </div>
        </div>
      </section>
    </main>
    <!-- Bottom Navigation Bar -->
    <nav
      class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-safe h-20 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md rounded-t-2xl shadow-[0_-4px_12px_rgba(0,0,0,0.05)] border-t border-outline-variant/30 z-50"
    >
      <a
        class="flex flex-col items-center justify-center text-primary transition-all duration-200"
        href="#"
      >
        <span
          class="material-symbols-outlined"
          data-icon="home"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >home</span
        >
        <span class="font-body font-bold text-[11px] mt-1">Home</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-all duration-200"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="directions_bus"
          >directions_bus</span
        >
        <span class="font-body font-medium text-[11px] mt-1">Routes</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-all duration-200"
        href="#"
      >
        <div
          class="bg-surface-container-highest w-12 h-12 rounded-full flex items-center justify-center mb-1 -mt-6 border-4 border-surface shadow-sm"
        >
          <span class="material-symbols-outlined" data-icon="qr_code_scanner"
            >qr_code_scanner</span
          >
        </div>
        <span class="font-body font-medium text-[11px]">Scan</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-all duration-200"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="history"
          >history</span
        >
        <span class="font-body font-medium text-[11px] mt-1">History</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary transition-all duration-200"
        href="#"
      >
        <span class="material-symbols-outlined" data-icon="person">person</span>
        <span class="font-body font-medium text-[11px] mt-1">Profile</span>
      </a>
    </nav>
    <script>
      var map = L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var userLocation = [14.8067222, 120.9378889];
      var busLocation = [14.8069722, 120.9388889];

      var busIcon = L.icon({
        iconUrl: 'https://img.icons8.com/color/48/bus.png',
        iconSize: [48, 48],
        iconAnchor: [24, 48],
        popupAnchor: [0, -48]
      });

      L.marker(userLocation).addTo(map)
        .bindPopup('Bus Destination').openPopup();
      L.marker(busLocation, { icon: busIcon }).addTo(map)
        .bindPopup('Bus Current Location');

      L.polyline([busLocation, userLocation], { color: 'blue' }).addTo(map);
      map.fitBounds(L.latLngBounds([userLocation, busLocation]).pad(0.25));
    </script>
</html>
