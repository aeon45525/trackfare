<style>
        body {
            background-color: #faf8ff;
            -webkit-font-smoothing: antialiased;
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            ring: 2px;
            ring-color: #0056d2;

<body class="font-body-md text-on-surface min-h-screen flex flex-col items-center">
<!-- Hero Section / Brand Logo -->
<header class="w-full flex flex-col items-center pt-xl pb-lg px-margin-mobile">
<div class="w-32 h-auto mb-lg overflow-hidden flex justify-center">
<img alt="TrackFare Logo" class="w-full h-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uiJdxbgai5h7F26KRn2EhgrlTeTuXGIMXUghgv9_J8Mtwm-FH0YdXoCrDGqbALNo2zbBk4BdBmrQuPowcNbtJ04AzuaPCMSR4MV60QpDMamOGGgUI2vUTNx3GFI9NgCn5TvJLn21SSkXqSqnOP_yLpNwW5gnhDX4ldC2iuO3EI_kfdZElWBGnUe5jX9y-4uxF6jLDLbWSHSWuUki4AWZQNH9IZKBSQBC2PTNEMyRhjNvbvJr_Lu0e6UZKsdulNScbwpAvjBkg-3rJY"/>
</div>
<div class="text-center max-w-sm">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter mb-sm">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">
                Join TrackFare to streamline your transit expenses and journey logs.
            </p>
</div>
</header>
<!-- Main Registration Form -->
<main class="w-full max-w-md px-margin-mobile pb-xl">
<form class="space-y-md">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-primary block px-xs" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-secondary">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full h-12 pl-11 pr-md bg-surface-container-low border border-outline-variant/30 rounded-xl font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-primary block px-xs" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-secondary">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-12 pl-11 pr-md bg-surface-container-low border border-outline-variant/30 rounded-xl font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="email" name="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-primary block px-xs" for="phone">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-secondary">
<span class="material-symbols-outlined text-[20px]">call</span>
</div>
<input class="w-full h-12 pl-11 pr-md bg-surface-container-low border border-outline-variant/30 rounded-xl font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-primary block px-xs" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-secondary">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-12 pl-11 pr-11 bg-surface-container-low border border-outline-variant/30 rounded-xl font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all" id="password" name="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Sign Up Button -->
<button class="w-full h-12 mt-lg bg-[#0056d2] text-on-primary font-headline-sm text-headline-sm rounded-xl shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-sm" type="submit">
                Sign Up
            </button>
</form>
<!-- Divider -->
<!-- Social Login Buttons -->
<!-- Footer Link -->
<footer class="mt-2xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-secondary font-headline-sm hover:underline underline-offset-4 ml-xs" href="#">Back to Login</a>
</p>
</footer>
</main>
<!-- Bottom Decorative Surface -->
<div class="hidden md:block fixed bottom-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary opacity-20"></div>
</body></html>
