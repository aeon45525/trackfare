<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TrackFare - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "brand-blue": "#0040a1"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "sans": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light font-sans text-background-dark antialiased">
<!-- Focused View: Navigation Excluded as per Rule 2 -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-start px-6 py-8">
<!-- Minimal Back Navigation (Rule 3) -->
<header class="flex w-full items-center justify-start mb-8">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-gray-200 transition-colors" data-icon="arrow_back">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</header>
<!-- Brand Logo Section -->
<div class="mb-10 flex flex-col items-center">
<div class="mb-4 h-24 w-24 overflow-hidden rounded-xl">
<img alt="TrackFare Logo" class="h-full w-full object-cover" data-alt="A minimalist and modern black and white illustration of a transit bus, used as the brand logo for TrackFare." src="https://lh3.googleusercontent.com/aida/ADBb0uiJdxbgai5h7F26KRn2EhgrlTeTuXGIMXUghgv9_J8Mtwm-FH0YdXoCrDGqbALNo2zbBk4BdBmrQuPowcNbtJ04AzuaPCMSR4MV60QpDMamOGGgUI2vUTNx3GFI9NgCn5TvJLn21SSkXqSqnOP_yLpNwW5gnhDX4ldC2iuO3EI_kfdZElWBGnUe5jX9y-4uxF6jLDLbWSHSWuUki4AWZQNH9IZKBSQBC2PTNEMyRhjNvbvJr_Lu0e6UZKsdulNScbwpAvjBkg-3rJY"/>
</div>
<h1 class="text-3xl font-bold tracking-tight text-background-dark">TrackFare</h1>
</div>
<!-- Heading -->
<div class="w-full max-w-md text-left mb-8">
<h2 class="text-2xl font-bold leading-tight">Welcome Back</h2>
<p class="mt-2 text-gray-500">Sign in to track your fares and manage your transit subscriptions.</p>
</div>
<!-- Login Form -->
<form class="flex w-full max-w-md flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold leading-none" for="email">Email Address</label>
<div class="relative">
<input class="flex h-14 w-full rounded-xl border border-gray-300 bg-white px-4 py-2 text-base ring-offset-white file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-gray-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold leading-none" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="flex h-14 w-full rounded-xl border border-gray-300 bg-white px-4 py-2 text-base ring-offset-white file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-gray-400 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 pr-12" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-gray-400 hover:text-gray-600" data-icon="visibility" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="mt-4 flex h-14 w-full items-center justify-center rounded-xl bg-brand-blue font-bold text-white shadow-lg hover:opacity-90 active:scale-[0.98] transition-all">
                Login
            </button>
</form>
<!-- Social/Alternative Login Divider -->
<!-- Social Login Buttons -->
<!-- Footer Sign Up -->
<footer class="mt-auto pt-8 text-center">
<p class="text-sm text-gray-600">
                Don't have an account? 
                <a class="font-bold text-primary hover:underline" href="#">Sign Up</a>
</p>
</footer>
</div>
</body></html>
